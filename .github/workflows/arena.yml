name: Arena Bot

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Type RUN to start arena bot"
        required: true
        default: "RUN"

jobs:
  run-arena:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: 11

      matrix:
        include:
          - id: 38
            game_id_secret: GAME_ID_38
            game_password_secret: GAME_PASSWORD_38

          - id: 14
            game_id_secret: GAME_ID_14
            game_password_secret: GAME_PASSWORD_14

          - id: 8
            game_id_secret: GAME_ID_8
            game_password_secret: GAME_PASSWORD_8

          - id: 27
            game_id_secret: GAME_ID_27
            game_password_secret: GAME_PASSWORD_27

          - id: 15
            game_id_secret: GAME_ID_15
            game_password_secret: GAME_PASSWORD_15

          - id: 9
            game_id_secret: GAME_ID_9
            game_password_secret: GAME_PASSWORD_9

          - id: 18
            game_id_secret: GAME_ID_18
            game_password_secret: GAME_PASSWORD_18

          - id: 37
            game_id_secret: GAME_ID_37
            game_password_secret: GAME_PASSWORD_37

          - id: 7
            game_id_secret: GAME_ID_7
            game_password_secret: GAME_PASSWORD_7

          - id: 13
            game_id_secret: GAME_ID_13
            game_password_secret: GAME_PASSWORD_13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manual trigger
        run: |
          echo "Mode: ${{ github.event.inputs.run_mode }}"
          if [ "${{ github.event.inputs.run_mode }}" != "RUN" ]; then
            echo "Not authorized run. Exiting."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn -U -B clean compile -Dmaven.wagon.http.retryHandler.count=5

      - name: Run Arena Bot
        env:
          GAME_ID: ${{ secrets[matrix.game_id_secret] }}
          GAME_PASSWORD: ${{ secrets[matrix.game_password_secret] }}
        run: mvn -B exec:java -Dexec.mainClass=ArenaMain
