name: Arena Bot

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Type RUN to start arena bot"
        required: true
        default: "RUN"

jobs:
  run-arena:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      max-parallel: 10

      matrix:
        include:
          - id: 1
            game_id_secret: GAME_ID_1
            game_password_secret: GAME_PASSWORD_1


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manual trigger
        run: |
          echo "Mode: ${{ github.event.inputs.run_mode }}"
          if [ "${{ github.event.inputs.run_mode }}" != "RUN" ]; then
            echo "Not authorized run. Exiting."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn -B clean compile

      - name: Run Arena Bot
        env:
          GAME_ID: ${{ secrets[ matrix.game_id_secret ] }}
          GAME_PASSWORD: ${{ secrets[ matrix.game_password_secret ] }}
        run: mvn -B exec:java -Dexec.mainClass=ArenaMain
